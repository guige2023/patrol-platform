name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-api-routes:
    name: Lint API Routes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run API route linter
        run: |
          python3 scripts/lint_api_routes.py

  api-tests:
    name: API Endpoint Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Start backend server
        run: |
          cd backend
          pip install -q -r requirements.txt
          nohup python3 -m uvicorn app.main:app --host 0.0.0.0 --port 18888 &
          sleep 5

      - name: Run API tests
        run: |
          bash scripts/test_api_endpoints.sh

  e2e-tests:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Start servers
        run: |
          cd backend
          pip install -q -r requirements.txt
          nohup python3 -m uvicorn app.main:app --host 0.0.0.0 --port 18888 &
          sleep 5

      - name: Install Node dependencies
        run: |
          cd frontend
          npm install --silent 2>/dev/null
          nohup npm run dev &
          sleep 10

      - name: Run E2E tests
        run: |
          bash scripts/e2e_tests.sh
